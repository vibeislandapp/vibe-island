name: Discord Notifications

on:
  issues:
    types: [opened, labeled]

jobs:
  notify-bug:
    # Issue templates add default labels at creation, which also emits labeled
    # events. Post on opened, or when a maintainer/bot classifies it later.
    if: >-
      github.event_name == 'issues'
      && contains(github.event.issue.labels.*.name, 'bug')
      && (
        github.event.action == 'opened'
        || (
          github.event.action == 'labeled'
          && github.event.label.name == 'bug'
          && github.event.sender.login != github.event.issue.user.login
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Post to #bugs (Forum)
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_BUGS }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_AUTHOR_URL: ${{ github.event.issue.user.html_url }}
        run: |
          TITLE=$(echo "$ISSUE_TITLE" | head -c 200)
          BODY=$(echo "$ISSUE_BODY" | head -c 300)

          jq -n \
            --arg thread_name "$TITLE" \
            --arg title "$TITLE" \
            --arg url "$ISSUE_URL" \
            --arg body "$BODY" \
            --arg labels "$ISSUE_LABELS" \
            --arg author "$ISSUE_AUTHOR" \
            --arg author_url "$ISSUE_AUTHOR_URL" \
            '{
              thread_name: $thread_name,
              embeds: [{
                title: ("\ud83d\udc1b " + $title),
                url: $url,
                description: $body,
                color: 14251863,
                fields: [
                  {name: "Labels", value: $labels, inline: true},
                  {name: "Author", value: ("[@" + $author + "](" + $author_url + ")"), inline: true}
                ],
                footer: {text: "Vibe Island Community"}
              }]
            }' | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

  notify-feature:
    if: >-
      contains(github.event.issue.labels.*.name, 'enhancement')
      && (
        github.event.action == 'opened'
        || (
          github.event.action == 'labeled'
          && github.event.label.name == 'enhancement'
          && github.event.sender.login != github.event.issue.user.login
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Post to #feature-requests (Issue → Forum)
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_FEATURES }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_AUTHOR_URL: ${{ github.event.issue.user.html_url }}
        run: |
          TITLE=$(echo "$ISSUE_TITLE" | head -c 200)
          BODY=$(echo "$ISSUE_BODY" | head -c 300)

          jq -n \
            --arg thread_name "$TITLE" \
            --arg title "$TITLE" \
            --arg url "$ISSUE_URL" \
            --arg body "$BODY" \
            --arg labels "$ISSUE_LABELS" \
            --arg author "$ISSUE_AUTHOR" \
            --arg author_url "$ISSUE_AUTHOR_URL" \
            '{
              thread_name: $thread_name,
              embeds: [{
                title: ("\u2728 " + $title),
                url: $url,
                description: $body,
                color: 5025616,
                fields: [
                  {name: "Labels", value: $labels, inline: true},
                  {name: "Author", value: ("[@" + $author + "](" + $author_url + ")"), inline: true}
                ],
                footer: {text: "Vibe Island Community"}
              }]
            }' | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"
