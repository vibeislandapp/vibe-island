name: "Feature Request"
description: "Suggest an improvement or new feature"
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your ideas!

  - type: textarea
    id: problem
    attributes:
      label: "Problem or motivation"
      description: "What problem does this solve?"
      placeholder: "I often find myself..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed solution"
      description: "How do you envision this working?"
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives you've tried"
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: "Area"
      options:
        - Notch Panel / UI
        - Terminal Jumping
        - Permission Approval
        - Sound / Notifications
        - CLI Integration (new CLI support)
        - Settings / Configuration
        - Usage Tracking
        - Other
    validations:
      required: true

  - type: checkboxes
    id: search
    attributes:
      label: "Checklist"
      options:
        - label: "I searched existing issues and this hasn't been requested yet"
          required: true
